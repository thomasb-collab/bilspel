<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dalarna Race</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--ac:#00e5ff;--ac2:#ff6b35;--warn:#ff3b3b;--green:#00ff88;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#07090c;overflow:hidden;font-family:'Rajdhani',sans-serif;}
#gw{position:relative;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;}
#gc{display:block;width:100%;max-width:520px;flex:1;min-height:0;}
#hud{position:absolute;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10;gap:6px;}
.hp{background:rgba(7,9,14,.88);border:1px solid rgba(0,229,255,.18);border-radius:10px;padding:6px 14px;backdrop-filter:blur(14px);display:flex;flex-direction:column;align-items:center;min-width:80px;}
.hl{font-size:8px;font-weight:600;letter-spacing:2.5px;color:rgba(0,229,255,.55);text-transform:uppercase;margin-bottom:2px;}
.hv{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;color:#fff;line-height:1;}
#pb{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;padding:7px 14px;pointer-events:none;z-index:10;}
#pl{display:flex;justify-content:space-between;margin-bottom:4px;}
.pt{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.28);font-weight:600;}
.pt.on{color:var(--ac);}
#ptr{width:100%;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
#pf{height:100%;width:0%;background:linear-gradient(90deg,#00e5ff,#00ffaa);border-radius:2px;box-shadow:0 0 8px #00e5ff80;transition:width .1s;}
#mc{display:flex;width:100%;max-width:520px;flex-shrink:0;}
#mc button{flex:1;background:rgba(255,255,255,.03);color:rgba(255,255,255,.65);border:none;border-top:1px solid rgba(255,255,255,.07);padding:18px 0;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;transition:background .1s;font-family:'Rajdhani',sans-serif;letter-spacing:2px;font-size:14px;font-weight:700;}
#mc button:active,#mc button.on{background:rgba(0,229,255,.12);color:var(--ac);}
#mc button:first-child{border-right:1px solid rgba(255,255,255,.07);}
#flash{position:absolute;inset:0;background:rgba(255,60,0,.45);z-index:40;pointer-events:none;opacity:0;transition:opacity .05s;}
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;padding:28px 24px;text-align:center;background:radial-gradient(ellipse at 50% 45%,rgba(0,22,42,.97) 0%,rgba(4,6,10,.99) 100%);}
.ov-chip{font-size:10px;letter-spacing:4px;color:var(--ac);border:1px solid rgba(0,229,255,.22);border-radius:100px;padding:4px 18px;margin-bottom:14px;font-weight:600;}
.ov-title{font-family:'Orbitron',sans-serif;font-size:clamp(30px,9vw,52px);font-weight:900;letter-spacing:4px;color:#fff;line-height:.9;margin-bottom:6px;}
.ov-sub{font-size:13px;color:rgba(0,229,255,.8);letter-spacing:2px;margin-bottom:4px;font-weight:600;}
.boss-box{background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.22);border-radius:14px;padding:16px 20px;margin:16px 0 20px;max-width:320px;width:100%;}
.boss-emoji{font-size:30px;margin-bottom:5px;}
.boss-text{font-size:17px;font-weight:700;color:#fff;line-height:1.4;letter-spacing:.5px;}
.boss-from{font-size:10px;letter-spacing:2px;color:rgba(0,229,255,.5);margin-top:5px;font-weight:600;}
.ov-keys{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px;width:100%;max-width:300px;}
.ov-key{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:9px 12px;font-size:11px;color:rgba(255,255,255,.5);line-height:1.5;}
.ov-key strong{color:var(--ac);display:block;font-size:12px;letter-spacing:1px;}
#sb{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:4px;color:#000;background:var(--ac);border:none;padding:14px 40px;border-radius:10px;cursor:pointer;box-shadow:0 0 36px rgba(0,229,255,.5);transition:transform .15s,box-shadow .15s;}
#sb:hover{transform:scale(1.04);box-shadow:0 0 56px rgba(0,229,255,.7);}
#sb:active{transform:scale(.97);}
#animalWarn{position:absolute;top:62px;left:50%;transform:translateX(-50%);z-index:15;pointer-events:none;opacity:0;transition:opacity .3s;background:rgba(255,200,0,.13);border:2px solid rgba(255,200,0,.55);border-radius:10px;padding:5px 18px;font-size:13px;color:#ffd700;font-weight:700;letter-spacing:2px;white-space:nowrap;}

/* Speedometer */
#speedoWrap{position:absolute;right:14px;bottom:70px;z-index:20;pointer-events:none;}
#speedoCanvas{width:100px;height:100px;}
</style>
</head>
<body>
<div id="gw">
  <canvas id="gc"></canvas>
  <div id="hud">
    <div class="hp"><div class="hl">km/h</div><div class="hv" id="hs">0</div></div>
    <div class="hp"><div class="hl">sträcka</div><div class="hv" id="hpc" style="font-size:16px;color:var(--ac)">0%</div></div>
  </div>
  <div id="pb">
    <div id="pl">
      <span class="pt on">Grängesberg</span>
      <span class="pt" id="ptm">Ludvika</span>
      <span class="pt">Högskolan Dalarna</span>
    </div>
    <div id="ptr"><div id="pf"></div></div>
  </div>
  <div id="speedoWrap"><canvas id="speedoCanvas" width="100" height="100"></canvas></div>
  <div id="flash"></div>
  <div id="animalWarn"></div>
  <div id="ov">
    <div class="ov-chip">Dalarna County Racing</div>
    <div class="ov-title">DALARNA<br>RACE</div>
    <div class="ov-sub">Grängesberg → Högskolan Dalarna</div>
    <div class="boss-box">
      <div class="boss-emoji">📱</div>
      <div class="boss-text">"Nu ska chefen<br>rejsa till jobbet!"</div>
      <div class="boss-from">— SMS från chefen, 07:42</div>
    </div>
    <div class="ov-keys">
      <div class="ov-key"><strong>← →</strong>Byt fil</div>
      <div class="ov-key"><strong>↑ W</strong>Accelerera</div>
      <div class="ov-key"><strong>↓ S</strong>Bromsa</div>
      <div class="ov-key"><strong>200 km/h</strong>Topphastighet</div>
    </div>
    <button id="sb">KÖR IGÅNG</button>
  </div>
  <div id="mc">
    <button id="bL">◄ VÄNSTER</button>
    <button id="bR">HÖGER ►</button>
  </div>
</div>
<script>
const cv=document.getElementById('gc');
const cx=cv.getContext('2d');
const sc=document.getElementById('speedoCanvas');
const sx=sc.getContext('2d');
const wrap=document.getElementById('gw');

function resize(){
  cv.width=Math.min(wrap.clientWidth,520);
  cv.height=wrap.clientHeight-document.getElementById('mc').offsetHeight;
}
resize();
window.addEventListener('resize',resize);
const CW=()=>cv.width, CH=()=>cv.height;

const NUM_LANES=4;
const MAX_KMH=200;
const PLAYER_MAX_MS=55;   // ~200 km/h top, feels fast and reachable
const TOTAL_DIST=8000;

let gameState='menu',dist=0,scrollY=0;
let frameId=0,lastTs=0,frameCount=0;
let crashCooldown=0,crashShake=0,laneChangeCooldown=0;
let leftPressed=false,rightPressed=false,animalCooldown=0;

const keys={};

const player={
  lane:1,targetX:0,x:0,y:0,
  w:28,h:46,speed:0,
  maxSpeed:PLAYER_MAX_MS
};

let traffic=[],scenery=[],particles=[],animals=[];

// Cutscene
const cs={
  active:false,phase:0,t:0,
  carX:0,carY:0,carAngle:0,
  targetCarX:0,targetCarY:0,
  personX:0,personY:0,
  personFrame:0,personGone:false,
  doorX:0,doorY:0,sl:null
};

// ── ROAD GEOMETRY ─────────────────────────────────
function rb(){const m=CW()*.06;return{left:m,right:CW()-m,width:CW()-m*2};}
function laneX(l){const r=rb();return r.left+(r.width/NUM_LANES)*l+(r.width/NUM_LANES)/2;}

// ── INIT ──────────────────────────────────────────
function init(){
  dist=0;scrollY=0;frameCount=0;
  crashCooldown=0;crashShake=0;laneChangeCooldown=0;
  leftPressed=false;rightPressed=false;animalCooldown=0;
  player.lane=1;
  player.x=laneX(1)-player.w/2;
  player.targetX=player.x;
  player.y=CH()-140;
  player.speed=0;
  traffic=[];particles=[];animals=[];scenery=[];
  for(let i=0;i<90;i++) addScenery(-(Math.random()*CH()*8));
  for(let i=0;i<4;i++) spawnTraffic(-(i*250+100));
  cs.active=false;
  document.getElementById('animalWarn').style.opacity='0';
  document.getElementById('hud').style.opacity='1';
  document.getElementById('pb').style.opacity='1';
}

// ── SCENERY ───────────────────────────────────────
function addScenery(y){
  const r=rb(),side=Math.random()<.5?'L':'R';
  const types=['tree','tree','tree','bush','rock'];
  const treeTypes=['pine','pine','oak','birch'];
  scenery.push({
    x:side==='L'?4+Math.random()*(r.left-14):r.right+6+Math.random()*(CW()-r.right-14),
    y,side,
    type:types[Math.floor(Math.random()*types.length)],
    treeType:treeTypes[Math.floor(Math.random()*treeTypes.length)],
    sz:12+Math.random()*20
  });
}

// ── TRAFFIC ───────────────────────────────────────
const CAR_COLORS=['#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#7f8c8d','#d4ac0d','#1abc9c','#e84393','#c0392b'];
function spawnTraffic(y){
  const lane=Math.floor(Math.random()*NUM_LANES);
  traffic.push({
    lane,x:laneX(lane)-14,
    y:y!==undefined?y:-(50+Math.random()*150),
    w:28,h:44,
    speed:20+Math.random()*40,
    color:CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)]
  });
}

// ── ANIMALS ───────────────────────────────────────
const ANIMAL_TYPES=['moose','dog','bear','unicorn'];
function spawnAnimal(){
  const r=rb(),fromLeft=Math.random()<.5;
  const type=ANIMAL_TYPES[Math.floor(Math.random()*ANIMAL_TYPES.length)];
  animals.push({
    type,
    x:fromLeft?r.left-60:r.right+10,
    y:CH()*.25+Math.random()*CH()*.4,
    vx:fromLeft?1.5+Math.random()*.8:-(1.5+Math.random()*.8),
    fromLeft,w:40,h:36,gone:false,frameT:0
  });
  const names={moose:'🦌 ÄLG!',dog:'🐕 HUND!',bear:'🐻 BJÖRN!',unicorn:'🦄 UNICORN!'};
  const aw=document.getElementById('animalWarn');
  aw.textContent=names[type];aw.style.opacity='1';
  setTimeout(()=>aw.style.opacity='0',2200);
}

// ── DRAW HELPERS ──────────────────────────────────
function rr(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);
  cx.closePath();
}

// ── BACKGROUND & ROAD ─────────────────────────────
function drawBackground(){
  const r=rb(),h=CH(),w=CW();
  const blend=cityBlend();
  cx.fillStyle='#0d1117';cx.fillRect(0,0,w,h);
  // Forest grass strips (fade out)
  if(blend<1){
    const strH=44,off=(scrollY*.14)%strH;
    cx.globalAlpha=1-blend;
    for(let i=-1;i<h/strH+2;i++){
      const yy=i*strH-off;
      cx.fillStyle=(Math.floor(scrollY*.14/strH)+i)%2===0?'#1f4a1e':'#265825';
      cx.fillRect(0,yy,r.left,strH);cx.fillRect(r.right,yy,w-r.right,strH);
    }
    cx.globalAlpha=1;
  }
  // City sidewalk (fade in)
  drawSidewalk(blend);
}

function drawRoad(){
  const r=rb(),h=CH();
  cx.fillStyle='#1e2028';cx.fillRect(r.left,0,r.width,h);
  const segH=30,off=scrollY%segH;
  for(let i=-1;i<h/segH+2;i++){
    if((Math.floor(scrollY/segH)+i)%2===0){cx.fillStyle='rgba(255,255,255,.012)';cx.fillRect(r.left,i*segH-off,r.width,segH);}
  }
  cx.shadowBlur=8;cx.shadowColor='rgba(255,255,255,.25)';
  cx.fillStyle='#d0d8ee';cx.fillRect(r.left,0,3,h);cx.fillRect(r.right-3,0,3,h);
  cx.shadowBlur=0;
  const dH=26,dG=16,dT=dH+dG,lW=r.width/NUM_LANES;
  cx.fillStyle='rgba(255,255,255,.5)';
  for(let lane=1;lane<NUM_LANES;lane++){
    const lx=r.left+lW*lane;
    for(let i=-1;i<h/dT+2;i++) cx.fillRect(lx-1.5,i*dT-(scrollY%dT),3,dH);
  }
}

// ── SCENERY DRAW ──────────────────────────────────
function drawTreePine(x,y,sz){
  cx.fillStyle='#4a3020';cx.fillRect(x-2.5,y+sz*.45,5,sz*.7);
  const cols=['#1a5c1a','#206a20','#278027'];
  for(let i=0;i<3;i++){
    const ly=y+(sz*.4/3)*i,lw=sz*(.52-i*.09),lh=sz*(.38-i*.05);
    cx.fillStyle=cols[i];cx.beginPath();cx.moveTo(x,ly-lh*.6);cx.lineTo(x+lw,ly+lh*.4);cx.lineTo(x-lw,ly+lh*.4);cx.closePath();cx.fill();
  }
}
function drawTreeOak(x,y,sz){
  cx.fillStyle='#5a3820';cx.fillRect(x-2.5,y+sz*.3,5,sz*.8);
  cx.fillStyle='#1a5c1a';cx.beginPath();cx.arc(x,y+sz*.15,sz*.5,0,Math.PI*2);cx.fill();
  cx.fillStyle='#206a20';cx.beginPath();cx.arc(x-sz*.2,y,sz*.36,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(x+sz*.22,y+sz*.05,sz*.34,0,Math.PI*2);cx.fill();
  cx.fillStyle='#278027';cx.beginPath();cx.arc(x,y-sz*.1,sz*.26,0,Math.PI*2);cx.fill();
}
function drawTreeBirch(x,y,sz){
  cx.fillStyle='#ccd8cc';cx.fillRect(x-2.5,y+sz*.18,5,sz*.9);
  cx.fillStyle='#8a9e8a';for(let i=0;i<3;i++) cx.fillRect(x-2.5,y+sz*.28+i*sz*.22,5,2);
  cx.fillStyle='#1d5c1d';cx.beginPath();cx.arc(x,y+sz*.18,sz*.38,0,Math.PI*2);cx.fill();
  cx.fillStyle='#226a22';cx.beginPath();cx.arc(x-sz*.17,y+sz*.06,sz*.28,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(x+sz*.19,y+sz*.1,sz*.26,0,Math.PI*2);cx.fill();
}
function drawBush(x,y,sz){
  cx.fillStyle='#174f17';cx.beginPath();cx.arc(x,y+sz*.3,sz*.42,0,Math.PI*2);cx.fill();
  cx.fillStyle='#1e621e';cx.beginPath();cx.arc(x-sz*.18,y+sz*.24,sz*.3,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(x+sz*.2,y+sz*.2,sz*.28,0,Math.PI*2);cx.fill();
}
function drawRock(x,y,sz){
  cx.fillStyle='#3a3a44';cx.beginPath();cx.ellipse(x,y+sz*.3,sz*.52,sz*.28,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#555560';cx.beginPath();cx.ellipse(x-sz*.05,y+sz*.2,sz*.4,sz*.2,-.2,0,Math.PI*2);cx.fill();
}
function drawScenery(){
  scenery.forEach(s=>{
    const sy=s.y+scrollY;
    if(sy<-60||sy>CH()+20) return;
    if(s.type==='tree'){
      if(s.treeType==='pine') drawTreePine(s.x,sy,s.sz);
      else if(s.treeType==='oak') drawTreeOak(s.x,sy,s.sz);
      else drawTreeBirch(s.x,sy,s.sz);
    } else if(s.type==='bush') drawBush(s.x,sy,s.sz);
    else drawRock(s.x,sy,s.sz);
  });
}

// ── ANIMALS ───────────────────────────────────────
function drawAnimal(a){
  cx.save();
  const flip=a.vx<0;
  if(flip){cx.translate(a.x+a.w,0);cx.scale(-1,1);}
  const ox=flip?0:a.x, oy=a.y;
  const bob=Math.sin(a.frameT*9)*2;
  switch(a.type){
    case 'moose': drawMoose(ox,oy+bob,a.frameT); break;
    case 'dog':   drawDog(ox,oy+bob,a.frameT); break;
    case 'bear':  drawBear(ox,oy+bob,a.frameT); break;
    case 'unicorn': drawUnicorn(ox,oy+bob,a.frameT); break;
  }
  cx.restore();
}

function drawMoose(x,y,t){
  cx.fillStyle='#6b4c2a';cx.beginPath();cx.ellipse(x+19,y+16,16,10,-.1,0,Math.PI*2);cx.fill();
  cx.fillStyle='#7a5830';cx.beginPath();cx.ellipse(x+33,y+10,8,6,-.3,0,Math.PI*2);cx.fill();
  cx.fillStyle='#4a3018';cx.beginPath();cx.ellipse(x+40,y+11,4,3,.1,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';cx.beginPath();cx.arc(x+35,y+8,2,0,Math.PI*2);cx.fill();
  cx.fillStyle='#111';cx.beginPath();cx.arc(x+35.5,y+8,1,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#5a3820';cx.lineWidth=2.5;
  cx.beginPath();cx.moveTo(x+32,y+5);cx.lineTo(x+28,y-8);cx.lineTo(x+24,y-4);cx.stroke();
  cx.beginPath();cx.moveTo(x+32,y+5);cx.lineTo(x+35,y-9);cx.lineTo(x+38,y-5);cx.stroke();
  const lo=Math.sin(t*12)*5;
  cx.strokeStyle='#5a3e20';cx.lineWidth=3;cx.lineCap='round';
  [[x+12,lo],[x+18,-lo],[x+26,lo],[x+32,-lo]].forEach(([lx,lv])=>{
    cx.beginPath();cx.moveTo(lx,y+22);cx.lineTo(lx-1,y+33+lv);cx.stroke();
  });
}

function drawDog(x,y,t){
  cx.fillStyle='#c8a060';cx.beginPath();cx.ellipse(x+16,y+15,13,8,.1,0,Math.PI*2);cx.fill();
  cx.fillStyle='#d4aa70';cx.beginPath();cx.ellipse(x+28,y+10,8,7,-.2,0,Math.PI*2);cx.fill();
  cx.fillStyle='#b88840';cx.beginPath();cx.ellipse(x+35,y+13,5,3,.1,0,Math.PI*2);cx.fill();
  cx.fillStyle='#333';cx.beginPath();cx.arc(x+37,y+12,2,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';cx.beginPath();cx.arc(x+30,y+8,2,0,Math.PI*2);cx.fill();
  cx.fillStyle='#111';cx.beginPath();cx.arc(x+30.5,y+8,1.2,0,Math.PI*2);cx.fill();
  cx.fillStyle='#a87040';cx.beginPath();cx.ellipse(x+25,y+4,4,6,.5,0,Math.PI*2);cx.fill();
  const lo=Math.sin(t*12)*4;
  cx.strokeStyle='#a87040';cx.lineWidth=2.5;cx.lineCap='round';
  [[x+10,lo],[x+16,-lo],[x+22,lo],[x+28,-lo]].forEach(([lx,lv])=>{
    cx.beginPath();cx.moveTo(lx,y+20);cx.lineTo(lx,y+31+lv);cx.stroke();
  });
  const tw=Math.sin(t*15)*18;
  cx.strokeStyle='#c8a060';cx.lineWidth=3;
  cx.beginPath();cx.moveTo(x+4,y+12);cx.quadraticCurveTo(x-4,y+2+tw,x-8,y+6);cx.stroke();
}

function drawBear(x,y,t){
  cx.fillStyle='#5a3c20';cx.beginPath();cx.ellipse(x+17,y+17,15,12,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#6b4a28';cx.beginPath();cx.arc(x+30,y+11,10,0,Math.PI*2);cx.fill();
  cx.fillStyle='#5a3c20';cx.beginPath();cx.arc(x+24,y+3,5,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(x+36,y+3,5,0,Math.PI*2);cx.fill();
  cx.fillStyle='#c08060';cx.beginPath();cx.arc(x+24,y+3,3,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(x+36,y+3,3,0,Math.PI*2);cx.fill();
  cx.fillStyle='#8a6040';cx.beginPath();cx.ellipse(x+30,y+14,6,4,.1,0,Math.PI*2);cx.fill();
  cx.fillStyle='#222';cx.beginPath();cx.arc(x+30,y+15,1.5,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';cx.beginPath();cx.arc(x+26,y+9,2,0,Math.PI*2);cx.fill();
  cx.fillStyle='#111';cx.beginPath();cx.arc(x+26.5,y+9,1.2,0,Math.PI*2);cx.fill();
  const lo=Math.sin(t*10)*4;
  cx.fillStyle='#5a3c20';
  [[x+6,lo],[x+14,-lo],[x+22,lo],[x+30,-lo]].forEach(([lx,lv])=>{

initCityBuildings();

function drawCityBuildings(blend){
  if(blend<=0) return;
  const r=rb();
  CITY_BUILDINGS.forEach(b=>{
    // world y: building appears spaced through the city zone
    // map relY in [0,1] to world scroll range
    const worldH=TOTAL_DIST*0.35; // city zone world length
    const startY=-(TOTAL_DIST*0.65);  // when dist ~65% => scroll covers this
    const bWorldY=startY+b.relY*worldH;
    // repeat every worldH units
    let screenY=bWorldY+scrollY;
    // tile so buildings repeat
    const tile=worldH;
    screenY=((screenY%tile)+tile)%tile - tile*0.3;

    if(screenY<-b.h-20||screenY>CH()+20) return;

    const margin=4;
    const bx=b.side==='L'? r.left-b.w-margin : r.right+margin;
    const by=screenY;

    cx.save();
    cx.globalAlpha=blend;

    // Building body
    cx.fillStyle=b.col;
    cx.fillRect(bx,by,b.w,b.h);

    // Roof line accent
    cx.fillStyle='rgba(255,255,255,0.06)';
    cx.fillRect(bx,by,b.w,4);

    // Windows grid
    const cols=Math.max(2,Math.floor(b.w/14));
    const floorH=Math.floor(b.h/b.floors);
    for(let fl=0;fl<b.floors;fl++){
      for(let col=0;col<cols;col++){
        const wx=bx+4+col*((b.w-8)/cols);
        const wy=by+4+fl*floorH+3;
        const ww=(b.w-8)/cols-4;
        const wh=floorH-6;
        if(wh<4||ww<4) continue;
        // Random lit windows
        const lit=((fl*7+col*13+Math.floor(b.relY*100))%5)!==0;
        if(lit){
          cx.shadowBlur=6; cx.shadowColor=b.win;
          cx.fillStyle=b.win;
        } else {
          cx.shadowBlur=0;
          cx.fillStyle='rgba(0,0,0,0.5)';
        }
        cx.fillRect(wx,wy,ww,wh);
      }
    }
    cx.shadowBlur=0;

    // Side shading
    cx.fillStyle='rgba(0,0,0,0.18)';
    cx.fillRect(bx+(b.side==='L'?b.w-6:0),by,6,b.h);

    cx.restore();
  });
}

// Lampposts along road edges
function drawLampposts(blend){
  if(blend<=0) return;
  const r=rb();
  const spacing=120;
  const off=scrollY%spacing;
  cx.globalAlpha=blend;
  for(let i=-1;i<CH()/spacing+2;i++){
    const sy=i*spacing-off;
    if(sy<-20||sy>CH()+10) continue;
    // Left post
    drawLamppost(r.left-10,sy,false);
    // Right post
    drawLamppost(r.right+10,sy,true);
  }
  cx.globalAlpha=1;
}

function drawLamppost(x,y,flip){
  cx.save();
  if(flip){cx.translate(x*2,0);cx.scale(-1,1);}
  const px=flip?0:x;
  // Pole
  cx.strokeStyle='#888898'; cx.lineWidth=3; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(px,y+20); cx.lineTo(px,y-10); cx.stroke();
  // Arm
  cx.beginPath(); cx.moveTo(px,y-10); cx.lineTo(px-14,y-16); cx.stroke();
  // Light head
  cx.fillStyle='#444455'; cx.fillRect(px-18,y-20,8,5);
  // Glow
  cx.shadowBlur=12; cx.shadowColor='#ffe8a0';
  cx.fillStyle='#fffacc'; cx.fillRect(px-17,y-19,6,3);
  cx.shadowBlur=0;
  // Ground cone of light
  const lg=cx.createRadialGradient(px-14,y-16,0,px-14,y-16,30);
  lg.addColorStop(0,'rgba(255,240,160,0.12)');
  lg.addColorStop(1,'rgba(255,240,160,0)');
  cx.fillStyle=lg;
  cx.beginPath(); cx.arc(px-14,y-16,30,0,Math.PI*2); cx.fill();
  cx.restore();
}

// Road markings: pedestrian crossings near end
function drawCrossings(blend){
  if(blend<0.3) return;
  const r=rb();

// Sidewalk color blend on grass strips
function drawSidewalk(blend){

// ── SPEEDOMETER ───────────────────────────────────
function drawSpeedo(){
  const w=100,h=100,cxs=w/2,cys=h/2,rad=38;
  const kmh=Math.min(MAX_KMH,Math.floor(player.speed*3.6));
  const ratio=kmh/MAX_KMH;
  sx.clearRect(0,0,w,h);
  // bg
  sx.fillStyle='rgba(8,10,18,.88)';sx.beginPath();sx.arc(cxs,cys,rad+6,0,Math.PI*2);sx.fill();
  sx.strokeStyle='rgba(0,229,255,.2)';sx.lineWidth=1;sx.stroke();
  // track
  sx.beginPath();sx.arc(cxs,cys,rad,Math.PI*.75,Math.PI*2.25);
  sx.strokeStyle='rgba(255,255,255,.08)';sx.lineWidth=6;sx.lineCap='round';sx.stroke();
  // fill
  if(ratio>0){
    const hue=Math.floor(180-ratio*150);
    sx.beginPath();sx.arc(cxs,cys,rad,Math.PI*.75,Math.PI*.75+ratio*Math.PI*1.5);
    const g=sx.createLinearGradient(cxs-rad,cys,cxs+rad,cys);
    g.addColorStop(0,`hsl(${hue+40},100%,60%)`);g.addColorStop(1,`hsl(${hue},100%,55%)`);
    sx.strokeStyle=g;sx.lineWidth=6;sx.lineCap='round';
    sx.shadowBlur=14;sx.shadowColor=`hsl(${hue},100%,60%)`;sx.stroke();sx.shadowBlur=0;
  }
  // tick marks
  for(let i=0;i<=10;i++){
    const angle=Math.PI*.75+i*(Math.PI*1.5/10);
    const inner=i%2===0?rad-10:rad-6;
    sx.strokeStyle=i%2===0?'rgba(255,255,255,.5)':'rgba(255,255,255,.2)';
    sx.lineWidth=i%2===0?2:1;
    sx.beginPath();
    sx.moveTo(cxs+Math.cos(angle)*inner,cys+Math.sin(angle)*inner);
    sx.lineTo(cxs+Math.cos(angle)*(rad-2),cys+Math.sin(angle)*(rad-2));
    sx.stroke();
    if(i%2===0){
      const label=i*20;
      sx.fillStyle='rgba(255,255,255,.35)';sx.font='bold 7px Rajdhani,sans-serif';sx.textAlign='center';sx.textBaseline='middle';
      sx.fillText(label,cxs+Math.cos(angle)*(rad-16),cys+Math.sin(angle)*(rad-16));
    }
  }
  // needle
  const needleAngle=Math.PI*.75+ratio*Math.PI*1.5;
  sx.strokeStyle='#ff4422';sx.lineWidth=2;sx.lineCap='round';sx.shadowBlur=6;sx.shadowColor='#ff4422';
  sx.beginPath();sx.moveTo(cxs,cys);sx.lineTo(cxs+Math.cos(needleAngle)*(rad-8),cys+Math.sin(needleAngle)*(rad-8));sx.stroke();sx.shadowBlur=0;
  // center dot
  sx.fillStyle='#ff4422';sx.beginPath();sx.arc(cxs,cys,4,0,Math.PI*2);sx.fill();
  // km/h text
  sx.fillStyle='#fff';sx.font='bold 16px Orbitron,monospace';sx.textAlign='center';sx.textBaseline='middle';sx.fillText(kmh,cxs,cys+4);
  sx.fillStyle='rgba(0,229,255,.65)';sx.font='7px Rajdhani,sans-serif';sx.fillText('km/h',cxs,cys+16);
}

  cx.fillStyle='#2244aa';rr(-6,-2,12,14,4);cx.fill();
  cx.strokeStyle='#2244aa';cx.lineWidth=3;
  const armA=Math.sin(runFrame*12+Math.PI)*20;
  cx.beginPath();cx.moveTo(0,2);cx.lineTo(-8+armA*.2,9+bob);cx.stroke();
  cx.beginPath();cx.moveTo(0,2);cx.lineTo(8-armA*.2,9+bob);cx.stroke();
  cx.fillStyle='#f0c880';cx.beginPath();cx.arc(0,-8,7,0,Math.PI*2);cx.fill();

  cx.fillStyle='#222';cx.beginPath();cx.arc(-2,-8,1.2,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(2,-8,1.2,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#222';cx.lineWidth=1.5;cx.beginPath();cx.arc(0,-6,2,.1,Math.PI-.1);cx.stroke();
  cx.fillStyle='#8B4513';rr(7,4,10,8,2);cx.fill();
  cx.strokeStyle='#5a2d0a';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(10,4);cx.lineTo(10,3);cx.lineTo(14,3);cx.lineTo(14,4);cx.stroke();
  cx.restore();
}

// ── CUTSCENE ──────────────────────────────────────
function getSchoolLayout(){
  const r=rb();
  return{x:r.left-6,y:CH()*.1,w:r.width+12,h:76,doorX:r.left+r.width/2,doorY:CH()*.1+70};
}

function startCutscene(){
  gameState='cutscene';
  const sl=getSchoolLayout();
  cs.active=true;cs.phase=0;cs.t=0;
  cs.carX=player.x;cs.carY=player.y;cs.carAngle=0;
  cs.targetCarX=sl.x+sl.w*.62-player.w/2;
  cs.targetCarY=sl.y+sl.h+18;
  cs.personX=cs.targetCarX+player.w/2;
  cs.personY=cs.targetCarY;
  cs.personFrame=0;cs.personGone=false;
  cs.doorX=sl.doorX;cs.doorY=sl.doorY;cs.sl=sl;
  document.getElementById('hud').style.opacity='0';
  document.getElementById('pb').style.opacity='0';
  document.getElementById('animalWarn').style.opacity='0';
  cancelAnimationFrame(frameId);
  frameId=requestAnimationFrame(cutsceneLoop);
}

function updateCutscene(dt){
  cs.t+=dt;
  if(cs.phase===0){
    cs.carX+=(cs.targetCarX-cs.carX)*dt*3.2;
    cs.carY+=(cs.targetCarY-cs.carY)*dt*2.8;
    cs.carAngle=Math.sin(cs.t*9)*(1.2-cs.t*.5)*.35;
    if(frameCount%2===0) spawnDriftSmoke(cs.carX+player.w/2,cs.carY+player.h);
    if(cs.t>2){ cs.phase=1;cs.t=0; }
  } else if(cs.phase===1){
    cs.carAngle*=.8;
    if(cs.t>.6){ cs.phase=2;cs.t=0;cs.personX=cs.carX+player.w/2;cs.personY=cs.targetCarY; }
  } else if(cs.phase===2){
    cs.personFrame+=dt;
    if(!cs.personGone){
      const dx=cs.doorX-cs.personX,dy=cs.doorY-cs.personY;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>5){cs.personX+=dx/d*95*dt;cs.personY+=dy/d*95*dt;}
      else{cs.personGone=true;cs.t=0;}
    }
    if(cs.personGone&&cs.t>0.9){ cs.phase=3;showWinOverlay(); }
  }
}

function drawCutscene(){
  cx.clearRect(0,0,CW(),CH());
  drawBackground();drawRoad();
  drawCityBuildings(1);
  drawLampposts(1);
  drawStreetSigns(1);
  drawParticles();
  const sl=cs.sl;
  drawSchoolAt(sl.x,sl.y,sl.w);
  // Car with drift angle
  cx.save();
  cx.translate(cs.carX+player.w/2,cs.carY+player.h/2);
  cx.rotate(cs.carAngle);
  drawCar({x:-player.w/2,y:-player.h/2,w:player.w,h:player.h,color:'#111'},true);
  cx.restore();
  // Person running
  if(!cs.personGone&&cs.phase>=2){
    const facingLeft=cs.doorX<cs.personX;
    cx.save();
    if(facingLeft){cx.translate(cs.personX*2,0);cx.scale(-1,1);}
    drawPerson(facingLeft?CW()-cs.personX:cs.personX,cs.personY,cs.personFrame);
    cx.restore();
  }
  if(cs.personGone&&cs.phase===2&&cs.t<.3){
    cx.fillStyle=`rgba(255,255,200,${.45*(1-cs.t/.3)})`;cx.fillRect(0,0,CW(),CH());
  }
  drawSpeedo();
}

function cutsceneLoop(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;frameCount++;
  updateCutscene(dt);drawCutscene();
  if(cs.phase<3) frameId=requestAnimationFrame(cutsceneLoop);
}

function showWinOverlay(){
  const timeTaken=Math.floor(frameCount/60); // rough seconds
  const ov=document.getElementById('ov');
  ov.innerHTML=`
    <div style="font-size:52px;margin-bottom:8px">🏁</div>
    <div class="ov-chip" style="color:#00ff88;border-color:rgba(0,255,136,.28)">Framme!</div>
    <div class="ov-title" style="color:#00ff88;font-size:clamp(24px,7vw,42px)">CHEFEN PÅ<br>JOBBET!</div>
    <div class="ov-sub" style="color:#00ff88">Just i tid!</div>
    <div class="boss-box" style="margin:14px 0 18px">
      <div class="boss-emoji">💼</div>
      <div class="boss-text">Bra körning, chef!</div>
    </div>
    <button id="sb">KÖR IGEN</button>
  `;
  ov.style.display='flex';
  document.getElementById('hud').style.opacity='1';
  document.getElementById('pb').style.opacity='1';
  document.getElementById('sb').addEventListener('click',startGame);
}

// ── UPDATE ────────────────────────────────────────
function handleLaneInput(){
  if(laneChangeCooldown>0) return;
  const goL=keys['ArrowLeft']||keys['a']||keys['A']||keys['_left'];
  const goR=keys['ArrowRight']||keys['d']||keys['D']||keys['_right'];
  if(goL&&!leftPressed){
    if(player.lane>0){player.lane--;player.targetX=laneX(player.lane)-player.w/2;laneChangeCooldown=.22;}
    leftPressed=true;
  } else if(!goL) leftPressed=false;
  if(goR&&!rightPressed){
    if(player.lane<NUM_LANES-1){player.lane++;player.targetX=laneX(player.lane)-player.w/2;laneChangeCooldown=.22;}
    rightPressed=true;
  } else if(!goR) rightPressed=false;
}

function update(dt){
  if(gameState!=='playing') return;
  const accel=keys['ArrowUp']||keys['w']||keys['W'];
  const brake=keys['ArrowDown']||keys['s']||keys['S'];
  if(accel) player.speed=Math.min(player.maxSpeed,player.speed+60*dt);
  else if(brake) player.speed=Math.max(0,player.speed-120*dt);
  else player.speed=Math.max(0,player.speed-22*dt);
  laneChangeCooldown=Math.max(0,laneChangeCooldown-dt);
  handleLaneInput();
  player.x+=(player.targetX-player.x)*(1-Math.pow(.012,dt));
  crashCooldown=Math.max(0,crashCooldown-dt);
  crashShake=Math.max(0,crashShake-.8);
  animalCooldown=Math.max(0,animalCooldown-dt);
  const scroll=player.speed*dt;
  scrollY+=scroll;dist+=scroll;

  // Traffic
  traffic.forEach(car=>{
    car.y-=car.speed*dt;
    const sy=car.y+scrollY;
    if(sy<-80){
      car.y=(CH()+80-scrollY)+Math.random()*300;
      car.lane=Math.floor(Math.random()*NUM_LANES);
      car.x=laneX(car.lane)-car.w/2;
      car.speed=20+Math.random()*40;
      car.color=CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)];
    }
    if(sy>CH()+120){car.y=(-80-scrollY)-Math.random()*100;car.lane=Math.floor(Math.random()*NUM_LANES);car.x=laneX(car.lane)-car.w/2;}
    if(crashCooldown<=0&&player.x<car.x+car.w-3&&player.x+player.w>car.x+3&&player.y<sy+car.h-3&&player.y+player.h>sy+3){
      player.speed*=.5;car.speed=Math.max(10,car.speed-15);
      spawnCrash(player.x+player.w/2,player.y+player.h/2);
      crashCooldown=1;crashShake=14;
      document.getElementById('flash').style.opacity='1';
      setTimeout(()=>document.getElementById('flash').style.opacity='0',90);
    }
  });

  // Animals
  if(animalCooldown<=0&&Math.random()<.005){spawnAnimal();animalCooldown=9+Math.random()*10;}
  animals.forEach(a=>{
    a.x+=a.vx*60*dt;a.frameT+=dt;
    const r=rb();
    if((a.fromLeft&&a.x>r.right+90)||(!a.fromLeft&&a.x<r.left-90)) a.gone=true;
    if(crashCooldown<=0&&!a.gone&&player.x<a.x+a.w-2&&player.x+player.w>a.x+2&&player.y<a.y+a.h-2&&player.y+player.h>a.y+2){
      player.speed*=.4;spawnCrash(player.x+player.w/2,player.y+player.h/2);
      crashCooldown=1.2;crashShake=16;
      document.getElementById('flash').style.opacity='1';
      setTimeout(()=>document.getElementById('flash').style.opacity='0',100);
    }
  });
  animals=animals.filter(a=>!a.gone);

  if(Math.random()<.005) spawnTraffic();
  scenery.forEach(s=>{if(s.y+scrollY>CH()+50) s.y-=CH()*10;});
  while(scenery.length<90) addScenery(-Math.random()*80);
  if(frameCount%2===0) spawnExhaust();
  if(dist>=TOTAL_DIST){startCutscene();return;}
  updateHUD();
  frameCount++;
}

function updateHUD(){
  const pct=Math.min(100,Math.floor(dist/TOTAL_DIST*100));
  document.getElementById('hs').textContent=Math.min(MAX_KMH,Math.floor(player.speed*3.6));
  document.getElementById('hpc').textContent=pct+'%';
  document.getElementById('pf').style.width=pct+'%';
  if(pct>=50) document.getElementById('ptm').classList.add('on');
}

// ── MAIN DRAW ─────────────────────────────────────
function draw(){
  if(gameState==='cutscene') return;
  cx.save();
  if(crashShake>1) cx.translate((Math.random()-.5)*crashShake*1.2,(Math.random()-.5)*crashShake*.4);
  cx.clearRect(0,0,CW(),CH());
  const blend=cityBlend();
  drawBackground();
  drawRoad();
  drawCrossings(blend);
  drawFarm();
  drawSchoolNormal();
  // City buildings (behind scenery so they appear as background)
  drawCityBuildings(blend);
  drawLampposts(blend);
  drawStreetSigns(blend);
  // Trees fade out as city comes in
  if(blend<1){
    cx.globalAlpha=1-blend;
    drawScenery();
    cx.globalAlpha=1;
  }
  drawParticles();
  animals.forEach(a=>drawAnimal(a));
  traffic.forEach(car=>{
    const sy=car.y+scrollY;
    if(sy<-60||sy>CH()+60) return;
    drawCar({...car,y:sy},false);
  });
  drawCar(player,true);
  cx.restore();
  drawSpeedo();
}

function loop(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;
  update(dt);draw();
  frameId=requestAnimationFrame(loop);
  frameCount++;
}

// ── START ──────────────────────────────────────────
function startGame(){
  document.getElementById('ov').style.display='none';
  cancelAnimationFrame(frameId);
  resize();init();
  gameState='playing';lastTs=0;frameCount=0;
  frameId=requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

const bL=document.getElementById('bL'),bR=document.getElementById('bR');
bL.addEventListener('pointerdown',e=>{keys['_left']=true;keys['ArrowUp']=true;bL.classList.add('on');e.preventDefault();});
bL.addEventListener('pointerup',()=>{keys['_left']=false;keys['ArrowUp']=false;bL.classList.remove('on');});
bL.addEventListener('pointerleave',()=>{keys['_left']=false;keys['ArrowUp']=false;bL.classList.remove('on');});
bR.addEventListener('pointerdown',e=>{keys['_right']=true;keys['ArrowUp']=true;bR.classList.add('on');e.preventDefault();});
bR.addEventListener('pointerup',()=>{keys['_right']=false;keys['ArrowUp']=false;bR.classList.remove('on');});
bR.addEventListener('pointerleave',()=>{keys['_right']=false;keys['ArrowUp']=false;bR.classList.remove('on');});
document.getElementById('sb').addEventListener('click',startGame);

resize();init();draw();drawSpeedo();
</script>
