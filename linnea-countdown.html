<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tills vi ses igen</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Cormorant Garamond', Georgia, serif; overflow-x: hidden; }
  body { background: #08050a; color: #f5e6d8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

  .bokeh { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bokeh span { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(255,210,120,0.14) 0%, transparent 70%); animation: floatup linear infinite; }
  @keyframes floatup { 0% { transform: translateY(0) scale(1); opacity: 0; } 8% { opacity: 1; } 88% { opacity: 0.45; } 100% { transform: translateY(-105vh) scale(1.2); opacity: 0; } }

  .settings-btn { position: fixed; top: 18px; right: 20px; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.18); border-radius: 6px; color: rgba(255,230,210,0.6); font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 0.12em; padding: 7px 18px; cursor: pointer; z-index: 100; transition: all 0.25s; }
  .settings-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,230,210,1); }
  .settings-panel { position: fixed; top: 54px; right: 20px; width: 280px; background: rgba(15,8,18,0.96); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 1.2rem 1.4rem 1rem; z-index: 100; display: none; flex-direction: column; gap: 14px; backdrop-filter: blur(12px); }
  .settings-panel.open { display: flex; }
  .settings-panel label { font-size: 11px; letter-spacing: 0.18em; color: rgba(255,220,190,0.55); text-transform: uppercase; margin-bottom: 5px; display: block; }
  .settings-panel input { width: 100%; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 6px; color: #f5e6d8; font-family: 'Cormorant Garamond', serif; font-size: 16px; padding: 8px 11px; color-scheme: dark; outline: none; }
  .save-btn { align-self: flex-end; background: rgba(220,160,80,0.15); border: 0.5px solid rgba(220,160,80,0.35); border-radius: 6px; color: rgba(255,220,160,0.9); font-family: 'Cormorant Garamond', serif; font-size: 14px; letter-spacing: 0.1em; padding: 7px 22px; cursor: pointer; margin-top: 2px; }

  .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem 2.5rem; width: 100%; max-width: 680px; text-align: center; }
  .eyebrow { font-size: 11px; letter-spacing: 0.32em; color: rgba(255,220,185,0.35); text-transform: uppercase; margin-bottom: 2rem; }
  .train-scene { width: 100%; max-width: 580px; margin-bottom: 2rem; }
  .scene-svg { width: 100%; height: auto; display: block; }
  .title { font-size: 26px; font-weight: 300; font-style: italic; color: #f5e6d8; letter-spacing: 0.04em; line-height: 1.35; }
  .subtitle-line { width: 36px; height: 0.5px; background: rgba(255,220,185,0.2); margin: 1rem auto; }
  .countdown { display: flex; align-items: flex-start; justify-content: center; margin: 1.2rem 0 0.5rem; }
  .unit { display: flex; flex-direction: column; align-items: center; width: 72px; }
  .unit-number { font-size: 52px; font-weight: 300; line-height: 1; color: #fff8f0; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .unit-label { font-size: 10px; letter-spacing: 0.22em; color: rgba(255,220,185,0.35); text-transform: uppercase; margin-top: 6px; }
  .sep { font-size: 42px; font-weight: 200; color: rgba(255,220,185,0.13); line-height: 1; padding: 0 2px; padding-top: 4px; }
  .quote { font-size: 16px; font-style: italic; font-weight: 300; color: rgba(245,230,210,0.38); margin-top: 1.8rem; letter-spacing: 0.03em; line-height: 1.8; max-width: 320px; transition: opacity 0.8s; }

  @media (max-width: 460px) { .unit { width: 56px; } .unit-number { font-size: 40px; } }
</style>
</head>
<body>

<div class="bokeh" id="bokeh"></div>



<div class="container">
  <p class="eyebrow">nedräkning</p>

  <div class="train-scene">
    <svg class="scene-svg" viewBox="0 0 580 160" xmlns="http://www.w3.org/2000/svg">

      <!-- Bakgrund natt -->
      <rect x="0" y="0" width="580" height="160" fill="#08050a"/>

      <!-- Stjärnor -->
      <circle cx="30" cy="15" r="0.8" fill="rgba(255,255,255,0.5)"/>
      <circle cx="75" cy="8" r="0.6" fill="rgba(255,255,255,0.4)"/>
      <circle cx="130" cy="20" r="0.9" fill="rgba(255,255,255,0.55)"/>
      <circle cx="195" cy="9" r="0.7" fill="rgba(255,255,255,0.35)"/>
      <circle cx="255" cy="24" r="0.6" fill="rgba(255,255,255,0.45)"/>
      <circle cx="305" cy="5" r="0.8" fill="rgba(255,255,255,0.5)"/>
      <circle cx="360" cy="17" r="0.7" fill="rgba(255,255,255,0.4)"/>
      <circle cx="48" cy="38" r="0.5" fill="rgba(255,255,255,0.3)"/>
      <circle cx="165" cy="45" r="0.6" fill="rgba(255,255,255,0.3)"/>
      <circle cx="235" cy="33" r="0.5" fill="rgba(255,255,255,0.35)"/>
      <circle cx="420" cy="12" r="0.6" fill="rgba(255,255,255,0.3)"/>
      <circle cx="100" cy="52" r="0.4" fill="rgba(255,255,255,0.25)"/>

      <!-- Kullar bakgrund -->
      <path d="M0,95 Q70,58 140,82 Q210,62 290,86 Q350,70 420,88 Q470,68 530,84 L580,88 L580,120 L0,120Z" fill="#110c18"/>

      <!-- Mark -->
      <rect x="0" y="116" width="580" height="44" fill="#0d0a14"/>

      <!-- Räls -->
      <rect x="0" y="128" width="580" height="1.5" fill="#251a30"/>
      <rect x="0" y="134" width="580" height="1.5" fill="#251a30"/>
      <!-- Syllar -->
      <rect x="10"  y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="40"  y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="70"  y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="100" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="130" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="160" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="190" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="220" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="250" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="280" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="310" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="340" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="370" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="400" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="430" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="460" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="490" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="520" y="126" width="3" height="11" rx="1" fill="#1c1424"/>
      <rect x="550" y="126" width="3" height="11" rx="1" fill="#1c1424"/>

      <!-- TUNNEL (ritas INNAN tåget så tåget glider in bakom) -->
      <!-- Berg/kulle -->
      <path d="M455,116 Q462,42 498,28 Q535,15 558,48 L580,80 L580,116Z" fill="#150f1e"/>
      <!-- Tunnel yttre båge -->
      <path d="M452,118 Q452,60 482,54 Q512,60 512,118Z" fill="#0f0a18"/>
      <!-- Tunnel inre (mörk öppning) -->
      <path d="M457,119 Q457,66 482,60 Q507,66 507,119Z" fill="#050308"/>
      <!-- Tunnel-kant subtil highlight -->
      <path d="M457,119 Q457,66 482,60 Q507,66 507,119" fill="none" stroke="rgba(255,200,150,0.1)" stroke-width="1.5"/>
      <!-- Liten glöd vid tunnelöppning -->
      <ellipse cx="482" cy="90" rx="18" ry="25" fill="rgba(255,180,80,0.04)"/>

      <!-- RÖK (animeras av JS) -->
      <circle id="s3" cx="0" cy="0" r="10" fill="rgba(130,110,155,0.1)" filter="url(#sb)"/>
      <circle id="s2" cx="0" cy="0" r="7"  fill="rgba(150,130,175,0.14)" filter="url(#sb)"/>
      <circle id="s1" cx="0" cy="0" r="4"  fill="rgba(170,150,195,0.2)"  filter="url(#sb)"/>

      <defs>
        <filter id="sb" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="2.5"/>
        </filter>
      </defs>

      <!-- TÅG-GRUPP (x=0 är lokfronten/nosen) -->
      <g id="trainGroup" transform="translate(80,0)">

        <!-- === LOK === -->
        <!-- Hjul lok -->
        <circle cx="-12" cy="128" r="5"  fill="#100c18" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>
        <circle cx="-12" cy="128" r="1.5" fill="rgba(255,255,255,0.2)"/>
        <circle cx="-30" cy="128" r="6.5" fill="#100c18" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
        <circle cx="-30" cy="128" r="2"   fill="rgba(255,255,255,0.2)"/>
        <circle cx="-50" cy="128" r="6.5" fill="#100c18" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
        <circle cx="-50" cy="128" r="2"   fill="rgba(255,255,255,0.2)"/>

        <!-- Lok-underdel -->
        <rect x="-70" y="106" width="66" height="20" rx="2" fill="#2c1e3e"/>
        <!-- Lok-kupa -->
        <rect x="-70" y="94"  width="52" height="14" rx="3" fill="#38264e"/>
        <!-- Lok-front sned -->
        <path d="M-4,106 L4,111 L4,126 L-4,126Z" fill="#44305c"/>
        <!-- Skorsten -->
        <rect x="-62" y="84" width="6" height="12" rx="1" fill="#221535"/>
        <rect x="-64" y="82" width="10" height="4"  rx="1" fill="#2c1c42"/>
        <!-- Fönster -->
        <rect x="-56" y="97" width="9" height="7" rx="1" fill="rgba(255,220,130,0.18)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
        <rect x="-43" y="97" width="9" height="7" rx="1" fill="rgba(255,220,130,0.14)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
        <!-- Strålkastare -->
        <circle cx="-2" cy="116" r="4" fill="rgba(255,245,190,0.92)"/>
        <path d="M-2,116 L28,103 L28,129Z" fill="rgba(255,245,190,0.04)"/>

        <!-- === VAGN 1 === -->
        <!-- Koppling -->
        <rect x="-84" y="119" width="14" height="3" rx="1" fill="#1a1228"/>
        <!-- Vagn-kropp -->
        <rect x="-158" y="96" width="72" height="28" rx="3" fill="#221535"/>
        <rect x="-156" y="93" width="68" height="7" rx="2" fill="#2c1e42"/>
        <!-- Fönster vagn 1 -->
        <rect x="-152" y="101" width="11" height="9" rx="1" fill="rgba(255,220,130,0.12)" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
        <rect x="-136" y="101" width="11" height="9" rx="1" fill="rgba(255,220,130,0.15)" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
        <rect x="-120" y="101" width="11" height="9" rx="1" fill="rgba(255,220,130,0.09)" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
        <rect x="-104" y="101" width="11" height="9" rx="1" fill="rgba(255,220,130,0.13)" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
        <!-- Hjul vagn 1 -->
        <circle cx="-144" cy="128" r="6" fill="#100c18" stroke="rgba(255,255,255,0.11)" stroke-width="0.8"/>
        <circle cx="-144" cy="128" r="1.8" fill="rgba(255,255,255,0.18)"/>
        <circle cx="-98"  cy="128" r="6" fill="#100c18" stroke="rgba(255,255,255,0.11)" stroke-width="0.8"/>
        <circle cx="-98"  cy="128" r="1.8" fill="rgba(255,255,255,0.18)"/>

        <!-- === VAGN 2 === -->
        <!-- Koppling -->
        <rect x="-170" y="119" width="14" height="3" rx="1" fill="#18102a"/>
        <!-- Vagn-kropp -->
        <rect x="-240" y="97" width="72" height="28" rx="3" fill="#1c1030"/>
        <rect x="-238" y="94" width="68" height="7" rx="2" fill="#251840"/>
        <!-- Fönster vagn 2 -->
        <rect x="-234" y="102" width="11" height="9" rx="1" fill="rgba(255,220,130,0.08)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
        <rect x="-218" y="102" width="11" height="9" rx="1" fill="rgba(255,220,130,0.11)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
        <rect x="-202" y="102" width="11" height="9" rx="1" fill="rgba(255,220,130,0.07)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
        <rect x="-186" y="102" width="11" height="9" rx="1" fill="rgba(255,220,130,0.1)"  stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
        <!-- Hjul vagn 2 -->
        <circle cx="-226" cy="128" r="6" fill="#100c18" stroke="rgba(255,255,255,0.09)" stroke-width="0.8"/>
        <circle cx="-226" cy="128" r="1.8" fill="rgba(255,255,255,0.15)"/>
        <circle cx="-180" cy="128" r="6" fill="#100c18" stroke="rgba(255,255,255,0.09)" stroke-width="0.8"/>
        <circle cx="-180" cy="128" r="1.8" fill="rgba(255,255,255,0.15)"/>
      </g>

    </svg>
  </div>

  <h1 class="title" id="mainTitle">Tills vi ses igen, Linnea</h1>
  <div class="subtitle-line"></div>

  <div class="countdown">
    <div class="unit"><span class="unit-number" id="days">--</span><span class="unit-label">dagar</span></div>
    <div class="sep">·</div>
    <div class="unit"><span class="unit-number" id="hours">--</span><span class="unit-label">timmar</span></div>
    <div class="sep">·</div>
    <div class="unit"><span class="unit-number" id="minutes">--</span><span class="unit-label">minuter</span></div>
    <div class="sep">·</div>
    <div class="unit"><span class="unit-number" id="seconds">--</span><span class="unit-label">sekunder</span></div>
  </div>

  <p class="quote" id="quoteText">Varje sekund tar oss lite närmare varandra.</p>
</div>

<script>
  // Bokeh
  const bokehEl = document.getElementById('bokeh');
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('span');
    const sz = 28 + Math.random() * 90;
    s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;bottom:'+(-sz)+'px;animation-duration:'+(14+Math.random()*20)+'s;animation-delay:'+(Math.random()*24)+'s;';
    bokehEl.appendChild(s);
  }

  // Hårdkodat datum: torsdag 2 april kl 20:00
  var targetDate  = new Date('2025-04-02T20:00:00');
  var partnerName = 'Linnea';
  var startDate   = new Date('2025-03-27T00:00:00'); // startpunkt för tågets resa

  var mainTitle = document.getElementById('mainTitle');
  var quoteText = document.getElementById('quoteText');

  // Tåg
  // Lokens nos är vid translateX(x), x=0 i gruppen.
  // Start: nos vid x=80 (tåget syns från vänster)
  // Slut:  nos vid x=455 (precis vid tunnelöppningens vänsterkant)
  var TRAIN_START = 80;
  var TRAIN_END   = 455;

  var trainGroup = document.getElementById('trainGroup');
  var s1 = document.getElementById('s1');
  var s2 = document.getElementById('s2');
  var s3 = document.getElementById('s3');
  var smokeT = 0;

  function getFrac() {
    var now  = new Date();
    var span    = targetDate - startDate;
    var elapsed = now - startDate;
    return span > 0 ? Math.max(0, Math.min(1, elapsed / span)) : 1;
  }

  function animFrame() {
    smokeT += 0.4;
    var frac = getFrac();
    var x = TRAIN_START + frac * (TRAIN_END - TRAIN_START);
    trainGroup.setAttribute('transform', 'translate('+x+',0)');

    // Rök ur skorstenens position: skorsten är vid cx-62 i gruppen
    var sx = x - 62;
    var sy = 82;
    var rise = (smokeT % 20);
    s1.setAttribute('cx', sx);
    s1.setAttribute('cy', sy - rise * 0.5);
    s2.setAttribute('cx', sx + rise * 0.15);
    s2.setAttribute('cy', sy - rise * 0.7 - 4);
    s3.setAttribute('cx', sx - rise * 0.1);
    s3.setAttribute('cy', sy - rise * 0.9 - 10);
    // Göm rök när tåget är nära tunneln
    var smokeOp = frac > 0.96 ? 0 : 1;
    s1.setAttribute('opacity', smokeOp);
    s2.setAttribute('opacity', smokeOp);
    s3.setAttribute('opacity', smokeOp);

    requestAnimationFrame(animFrame);
  }
  requestAnimationFrame(animFrame);

  // Nedräkning
  function pad(n) { return String(Math.max(0, Math.floor(n))).padStart(2,'0'); }
  var quotes = [
    'Varje sekund tar oss lite närmare varandra.',
    'Längtan är ett eget slags kärlek.',
    'Tanken på dig lyser upp varje dag.',
    'Bara lite till — sedan är vi tillsammans.',
    'Natten bär oss mot varandra.',
    'Du är värd varje sekund av väntan.',
  ];
  var lastIdx = 0;

  function tick() {
    var now  = new Date();
    var diff = targetDate - now;

    if (diff <= 0) {
      ['days','hours','minutes','seconds'].forEach(function(id) {
        document.getElementById(id).textContent = '00';
      });
      mainTitle.textContent = partnerName + ' är här ♡';
      quoteText.textContent = 'Nu är ni äntligen tillsammans.';
      return;
    }

    var ts = diff / 1000;
    document.getElementById('days').textContent    = pad(ts / 86400);
    document.getElementById('hours').textContent   = pad((ts % 86400) / 3600);
    document.getElementById('minutes').textContent = pad((ts % 3600) / 60);
    document.getElementById('seconds').textContent = pad(ts % 60);
    mainTitle.textContent = 'Tills vi ses igen, ' + partnerName;

    var idx = Math.floor(ts / 10) % quotes.length;
    if (idx !== lastIdx) {
      quoteText.style.opacity = '0';
      setTimeout(function() {
        quoteText.textContent   = quotes[idx];
        quoteText.style.opacity = '1';
      }, 600);
      lastIdx = idx;
    }
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
